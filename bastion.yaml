# Optional: Deploy this to add a bastion host so you can reach RDS from your laptop (e.g. DBeaver).
# Deploy after the main BLE stack. Then SSH to the bastion and use port forwarding, or use DBeaver's SSH tunnel.
AWSTemplateFormatVersion: '2010-09-09'
Description: Bastion host for BLE API VPC - SSH tunnel to RDS

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID from the main stack (e.g. from ble-people-tracker outputs or EC2 VPC console)
  RDSSecurityGroupId:
    Type: String
    Description: RDS security group ID (so we allow bastion -> RDS 5432). From main stack or RDS console.
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 key pair for SSH (must exist in this region)

Resources:
  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VpcId
      CidrBlock: 10.0.3.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-public
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-igw
  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VpcId
      InternetGatewayId: !Ref InternetGateway
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VpcId
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-public-rt
  DefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway
  SubnetRouteAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable
  BastionSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Bastion for SSH tunnel to RDS
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          DestinationSecurityGroupId: !Ref RDSSecurityGroupId
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-bastion-sg
  AllowBastionToRDS:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref RDSSecurityGroupId
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref BastionSecurityGroup
  BastionHost:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}'
      InstanceType: t3.micro
      KeyName: !Ref KeyName
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: '0'
          GroupSet:
            - !Ref BastionSecurityGroup
          SubnetId: !Ref PublicSubnet
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-bastion

Outputs:
  BastionPublicIp:
    Description: Public IP of the bastion - use for SSH or DBeaver SSH tunnel
    Value: !GetAtt BastionHost.PublicIp
  SSHCommand:
    Description: Example SSH command (replace KEY.pem with your key file)
    Value: !Sub 'ssh -i KEY.pem -L 5432:RDS_ENDPOINT:5432 ec2-user@${BastionHost.PublicIp}'
  DBeaverNote:
    Description: In DBeaver use SSH tab - Host this IP, port 22, user ec2-user, key file your .pem
    Value: !GetAtt BastionHost.PublicIp
